<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XML Tag Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e0e0ff;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#a78bfa;font-size:1.4rem;margin-bottom:6px;text-align:center}
p.sub{color:#6b7280;font-size:.85rem;margin-bottom:20px;text-align:center}
#app{width:100%;max-width:700px;flex:1}
.card{background:#13132a;border:1px solid #2d2d5e;border-radius:12px;padding:22px;margin-bottom:16px}
.q-num{color:#7c3aed;font-size:.8rem;font-weight:700;margin-bottom:8px}
.q-text{font-size:1rem;margin-bottom:14px;line-height:1.5}
.opts button{display:block;width:100%;text-align:left;background:#1e1e3f;color:#c4b5fd;border:1px solid #3730a3;border-radius:8px;padding:10px 14px;margin-bottom:8px;cursor:pointer;font-size:.9rem;transition:background .2s}
.opts button:hover{background:#2d2b5e}
.opts button.correct{background:#14532d;border-color:#22c55e;color:#86efac}
.opts button.wrong{background:#450a0a;border-color:#ef4444;color:#fca5a5}
.opts button:disabled{cursor:default}
.feedback{font-size:.85rem;margin-top:8px;min-height:18px}
#score-box{display:none;text-align:center;padding:30px;background:#13132a;border:1px solid #7c3aed;border-radius:12px}
#score-box h2{color:#a78bfa;font-size:1.6rem;margin-bottom:10px}
#score-box p{color:#c4b5fd;margin-bottom:16px}
#restart{background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:10px 24px;cursor:pointer;font-size:1rem}
#restart:hover{background:#6d28d9}
footer{margin-top:24px;color:#374151;font-size:.75rem;text-align:center}
</style>
</head>
<body>
<div id="app">
<h1>🏷️ XML Tags & Claude Quiz</h1>
<p class="sub">Claude가 XML 태그를 사용하는 이유를 알아보세요!</p>
<div id="quiz-area"></div>
<div id="score-box">
  <h2 id="score-text"></h2>
  <p id="score-msg"></p>
  <button id="restart">다시 풀기</button>
</div>
</div>
<footer>🤖 AI Trend App · 2026-03-02 · Why XML tags are so fundamental to Claude</footer>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var qs=[
    {q:"Claude가 XML 태그를 사용하는 주된 이유는?",opts:["디자인을 예쁘게 하기 위해","콘텐츠 구조를 명확히 구분하기 위해","파일 용량을 줄이기 위해","HTML과 호환되기 때문에"],a:1,exp:"XML 태그는 콘텐츠의 역할과 경계를 명확히 구분해 AI가 정확히 파싱할 수 있게 합니다."},
    {q:"<context> 태그의 역할로 가장 적절한 것은?",opts:["출력 형식 지정","배경 정보 제공","오류 처리","스타일 정의"],a:1,exp:"<context> 태그는 Claude에게 배경 정보나 상황 맥락을 전달하는 데 사용됩니다."},
    {q:"XML 태그가 프롬프트 엔지니어링에서 중요한 이유는?",opts:["처리 속도가 빠름","모호성 제거와 명확한 경계 설정","토큰 수 절감","멀티모달 지원"],a:1,exp:"명확한 태그 경계는 Claude가 지시사항과 데이터를 혼동하지 않도록 도와줍니다."},
    {q:"<example> 태그를 사용하면 얻는 이점은?",opts:["응답 속도 향상","Claude가 원하는 출력 패턴을 학습","메모리 절약","보안 강화"],a:1,exp:"<example> 태그 안의 예시를 통해 Claude는 기대하는 응답 형식을 정확히 파악합니다."},
    {q:"XML 태그 기반 프롬프트의 특징이 아닌 것은?",opts:["구조화된 입력 제공","역할 분리 명확화","자동 번역 지원","재사용성 높은 템플릿"],a:2,exp:"XML 태그는 자동 번역 기능과는 무관합니다. 구조화·역할분리·재사용성이 핵심 장점입니다."}
  ];
  var score=0,answered=0,total=qs.length;
  var area=document.getElementById('quiz-area');
  var scoreBox=document.getElementById('score-box');
  var scoreText=document.getElementById('score-text');
  var scoreMsg=document.getElementById('score-msg');
  var restart=document.getElementById('restart');
  function render(){
    if(!area)return;
    area.innerHTML='';
    score=0;answered=0;
    if(scoreBox)scoreBox.style.display='none';
    qs.forEach(function(q,i){
      var card=document.createElement('div');
      card.className='card';
      card.innerHTML='<div class="q-num">Q'+(i+1)+' / '+total+'</div><div class="q-text">'+q.q+'</div><div class="opts" id="opts'+i+'"></div><div class="feedback" id="fb'+i+'"></div>';
      area.appendChild(card);
      var opts=document.getElementById('opts'+i);
      q.opts.forEach(function(opt,j){
        var btn=document.createElement('button');
        btn.textContent=opt;
        btn.addEventListener('click',function(){
          var btns=opts.querySelectorAll('button');
          btns.forEach(function(b){b.disabled=true;});
          var fb=document.getElementById('fb'+i);
          if(j===q.a){
            btn.className='correct';
            score++;
            if(fb)fb.innerHTML='<span style="color:#86efac">✔ 정답! </span>'+q.exp;
          } else {
            btn.className='wrong';
            if(btns[q.a])btns[q.a].className='correct';
            if(fb)fb.innerHTML='<span style="color:#fca5a5">✘ 오답. </span>'+q.exp;
          }
          answered++;
          if(answered===total){setTimeout(showScore,600);}
        });
        if(opts)opts.appendChild(btn);
      });
    });
  }
  function showScore(){
    if(!scoreBox||!scoreText||!scoreMsg)return;
    var pct=Math.round(score/total*100);
    scoreText.textContent=score+' / '+total+' 점 ('+pct+'%)';
    var msg=pct===100?'🏆 완벽합니다! XML 태그 마스터!':pct>=60?'👍 잘 하셨어요! 조금만 더 공부해봐요.':'📚 XML 태그를 더 깊이 공부해보세요!';
    scoreMsg.textContent=msg;
    scoreBox.style.display='block';
    scoreBox.scrollIntoView({behavior:'smooth'});
  }
  if(restart)restart.addEventListener('click',function(){render();window.scrollTo(0,0);});
  render();
});
</script>
</body>
</html>
