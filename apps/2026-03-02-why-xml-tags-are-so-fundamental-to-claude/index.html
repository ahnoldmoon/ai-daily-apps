<!DOCTYPE html>
<html lang="ko">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XML Tags Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#e0e0ff;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#a78bfa;font-size:1.4rem;margin:20px 0 4px;text-align:center}
p.sub{color:#6b7280;font-size:.85rem;margin-bottom:20px;text-align:center}
.card{background:#13132a;border:1px solid #2d2d5e;border-radius:12px;padding:20px;width:100%;max-width:700px;margin-bottom:14px}
.q-num{color:#7c3aed;font-size:.8rem;font-weight:bold;margin-bottom:8px}
.q-text{font-size:1rem;margin-bottom:14px;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{background:#1e1e3f;border:1px solid #3b3b7a;border-radius:8px;padding:10px 12px;cursor:pointer;font-size:.9rem;color:#c4c4f0;transition:.2s;text-align:left}
.opt:hover:not(:disabled){background:#2d2d6e;border-color:#7c3aed}
.opt.correct{background:#14532d;border-color:#22c55e;color:#86efac}
.opt.wrong{background:#450a0a;border-color:#ef4444;color:#fca5a5}
.opt:disabled{cursor:default}
.explain{margin-top:10px;font-size:.82rem;color:#94a3b8;background:#0d0d20;border-radius:6px;padding:8px 12px;display:none}
#score-box{background:#13132a;border:1px solid #4c1d95;border-radius:12px;padding:24px;text-align:center;width:100%;max-width:700px;display:none}
#score-box h2{color:#a78bfa;font-size:1.5rem;margin-bottom:8px}
#score-box p{color:#94a3b8;margin-bottom:16px}
#restart{background:#7c3aed;border:none;color:#fff;padding:10px 28px;border-radius:8px;cursor:pointer;font-size:1rem}
#restart:hover{background:#6d28d9}
footer{margin-top:auto;padding-top:24px;color:#3b3b6b;font-size:.75rem;text-align:center}
@media(max-width:480px){.opts{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>🏷️ XML Tags & Claude Quiz</h1>
<p class="sub">Why XML tags are fundamental to Claude — Test your knowledge!</p>
<div id="quiz"></div>
<div id="score-box">
  <h2 id="score-title"></h2>
  <p id="score-desc"></p>
  <button id="restart">🔄 다시 도전</button>
</div>
<footer>🤖 AI Trend App · 2026-03-02 · Why XML tags are so fundamental to Claude</footer>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var qs=[
    {q:"Claude가 XML 태그를 선호하는 가장 큰 이유는?",opts:["파일 크기 절약","구조적 파싱과 명확한 경계 구분","HTML과 호환","JSON보다 빠름"],a:1,ex:"XML 태그는 지시문과 콘텐츠 경계를 명확히 구분해 모델이 정확히 파싱하도록 돕습니다."},
    {q:"<context> 태그의 주요 역할은?",opts:["스타일 지정","배경 정보를 명확히 전달","코드 실행","오류 방지"],a:1,ex:"<context> 태그는 Claude에게 관련 배경 정보를 구조적으로 제공합니다."},
    {q:"프롬프트에서 XML 태그가 없을 때 발생하는 문제는?",opts:["응답이 더 빨라짐","토큰 절약","지시·데이터·예시 경계 모호","긴 응답 생성"],a:2,ex:"태그가 없으면 Claude가 어디까지가 지시이고 어디서부터 데이터인지 혼동할 수 있습니다."},
    {q:"<example> 태그의 올바른 용도는?",opts:["실제 처리할 데이터","퓨샷 예시 제공","시스템 설정","오류 메시지"],a:1,ex:"<example> 태그 안에 예시를 넣으면 Claude가 실제 입력과 예시를 명확히 구별합니다."},
    {q:"중첩 XML 태그 사용 시 이점은?",opts:["파일 압축","계층적 구조로 복잡한 지시 표현","속도 향상","토큰 감소"],a:1,ex:"중첩 태그를 통해 메인 지시, 제약 조건, 출력 형식 등을 계층적으로 표현할 수 있습니다."}
  ];
  var score=0,answered=0,total=qs.length;
  var qDiv=document.getElementById('quiz');
  var sBox=document.getElementById('score-box');
  var rBtn=document.getElementById('restart');

  function build(){
    score=0;answered=0;
    if(sBox)sBox.style.display='none';
    if(!qDiv)return;
    qDiv.innerHTML='';
    qs.forEach(function(item,i){
      var card=document.createElement('div');
      card.className='card';
      card.innerHTML='<div class="q-num">Q'+(i+1)+' / '+total+'</div><div class="q-text">'+item.q+'</div><div class="opts"></div><div class="explain">'+item.ex+'</div>';
      var optsDiv=card.querySelector('.opts');
      item.opts.forEach(function(o,j){
        var btn=document.createElement('button');
        btn.className='opt';btn.textContent=o;
        btn.addEventListener('click',function(){
          var btns=optsDiv.querySelectorAll('.opt');
          btns.forEach(function(b){b.disabled=true});
          if(j===item.a){btn.classList.add('correct');score++;}
          else{btn.classList.add('wrong');btns[item.a].classList.add('correct');}
          var ex=card.querySelector('.explain');
          if(ex)ex.style.display='block';
          answered++;
          if(answered===total)setTimeout(showScore,600);
        });
        optsDiv.appendChild(btn);
      });
      qDiv.appendChild(card);
    });
  }

  function showScore(){
    if(!sBox)return;
    sBox.style.display='block';
    var t=document.getElementById('score-title');
    var d=document.getElementById('score-desc');
    if(t)t.textContent='점수: '+score+' / '+total;
    var msg=score===total?'🎉 완벽합니다! XML 태그 마스터!':score>=3?'👍 잘 하셨습니다! 조금만 더!':'💡 XML 태그를 더 공부해보세요!';
    if(d)d.textContent=msg;
    sBox.scrollIntoView({behavior:'smooth'});
  }

  if(rBtn)rBtn.addEventListener('click',function(){if(qDiv)qDiv.scrollIntoView({behavior:'smooth'});build();});
  build();
});
</script>
</body>
</html>
